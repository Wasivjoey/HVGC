# Render.com Blueprint for HVGC LINEUP.
# In the Render dashboard: New → Blueprint, point it at this repo, and Render
# will create the Postgres database and the web service from this file.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: hvgc-lineup-db
    databaseName: lineup
    user: lineup
    plan: free            # free Postgres (upgrade to 'basic-256mb'+ for production)

services:
  - type: web
    name: hvgc-lineup
    runtime: python
    plan: free            # free web instance (sleeps when idle; upgrade for always-on + disk)
    region: oregon
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # Session signing key — Render generates a strong random value once.
      - key: SECRET_KEY
        generateValue: true
      # Postgres connection string, injected from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: hvgc-lineup-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Uploaded programme documents & avatars. By default they go to a writable
      # (but ephemeral) folder, cleared on each deploy. To keep them, uncomment
      # the disk block below AND set UPLOAD_PATH to /var/data/uploads.
      # - key: UPLOAD_PATH
      #   value: /var/data/uploads

      # ---- Optional: email for verification & password reset ----
      # Add these in the Render dashboard (or here) to enable real emails.
      # Without them the app shows verification/reset links on screen instead.
      # - key: SMTP_HOST
      #   value: smtp.example.com
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   value: your-smtp-user
      # - key: SMTP_PASSWORD
      #   sync: false        # set as a secret in the dashboard
      # - key: SMTP_FROM
      #   value: no-reply@yourchurch.org

      # ---- Optional AI auto-scheduler ----
      # Set an Anthropic API key to enable the "Use AI assistant" option when
      # generating a service roster. Without it the rules-based auto-scheduler
      # is used (always available). Outbound HTTPS to api.anthropic.com works on
      # all Render plans (it's port 443, not a blocked SMTP port).
      # - key: ANTHROPIC_API_KEY
      #   sync: false        # set as a secret in the dashboard
      # - key: AUTOSCHEDULE_MODEL
      #   value: claude-sonnet-5

    # ---- Optional persistent disk for uploaded files (paid plans only) ----
    # Uncomment this AND the UPLOAD_PATH env var above to keep uploaded
    # documents/avatars across deploys. mountPath must be the parent of UPLOAD_PATH.
    # disk:
    #   name: lineup-data
    #   mountPath: /var/data
    #   sizeGB: 1
